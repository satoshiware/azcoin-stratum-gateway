name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release metadata
        id: meta
        shell: bash
        run: |
          echo "version=$(tr -d '\r\n' < VERSION)" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/satoshiware/azcoin-stratum-gateway:sha-${{ steps.meta.outputs.short_sha }}
            ghcr.io/satoshiware/azcoin-stratum-gateway:v${{ steps.meta.outputs.version }}
          build-args: |
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
