name: Build

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo build (workspace locked)
        run: cargo build --workspace --locked

      - name: Docker build
        run: docker build -t azcoin-stratum-gateway:ci .
